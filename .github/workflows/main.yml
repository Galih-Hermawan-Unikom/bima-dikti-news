name: BIMA Pengumuman Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-announcements:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_METHOD: ${{ vars.NOTIFICATION_METHOD || 'telegram' }}
          TELEGRAM_SEND_FILES: ${{ vars.TELEGRAM_SEND_FILES || 'false' }}
        run: |
          python run_github.py

      - name: Commit cache
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add announcements_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update announcements cache"
            git push
          fi
        continue-on-error: true
